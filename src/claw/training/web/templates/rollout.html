{% extends "base.html" %}
{% set active = "rollout" %}
{% block title %}运行 Rollout — Claw{% endblock %}
{% block nav_meta %}生成训练轨迹{% endblock %}
{% block content %}
  <h1>🚀 运行 Rollout</h1>
  <p style="color:var(--muted); margin-top:0;">从任务套件生成结构化 Rollout JSONL，用于评测、回放和数据导出。</p>

  <div class="form-card">
    <div class="form-row">
      <div style="flex:2;">
        <label for="suite">任务套件 JSON</label>
        <input id="suite" type="text" value="{{ default_suite }}" placeholder="examples/training/sample_suite.json">
        <div class="help">建议演示使用默认 sample suite，速度更可控。</div>
      </div>
      <div>
        <label for="mode">模式</label>
        <select id="mode">
          <option value="mock" selected>Mock（推荐演示）</option>
          <option value="agent">真实 Agent</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div>
        <label for="output_name">输出文件名</label>
        <input id="output_name" type="text" value="rollouts_demo_{{ now }}.jsonl">
      </div>
      <div>
        <label for="repeats">重复次数</label>
        <input id="repeats" type="number" min="1" max="10" value="1">
      </div>
      <div>
        <label for="model">模型（真实 Agent 模式）</label>
        <input id="model" type="text" placeholder="留空使用默认配置">
      </div>
    </div>

    <button id="run" onclick="runRollout()">▶ 开始 Rollout</button>
    <button class="btn-secondary" id="stop" onclick="stopRollout()" style="display:none;">◼ 停止</button>
    <span id="status" class="stream-status"></span>
  </div>

  <h2>运行日志</h2>
  <div id="output" class="stream-box"><div class="empty">运行输出将在这里展示...</div></div>

<script>
let evt = null;
function textNode(value) { return document.createTextNode(String(value == null ? '' : value)); }
function appendLine(text, cls) {
  const out = document.getElementById('output');
  const empty = out.querySelector('.empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = cls || 'msg msg-system';
  const content = document.createElement('div');
  content.className = 'content';
  content.appendChild(textNode(text));
  div.appendChild(content);
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}
function setStatus(text, cls) {
  const s = document.getElementById('status');
  s.textContent = text;
  s.className = 'stream-status ' + cls;
}
function runRollout() {
  const suite = document.getElementById('suite').value.trim();
  const outName = document.getElementById('output_name').value.trim();
  const mode = document.getElementById('mode').value;
  const model = document.getElementById('model').value.trim();
  const repeats = document.getElementById('repeats').value;
  if (!suite || !outName) { alert('请填写 suite 和输出文件名'); return; }

  document.getElementById('output').innerHTML = '';
  document.getElementById('run').disabled = true;
  document.getElementById('stop').style.display = '';
  setStatus('运行中', 'status-running');

  const params = new URLSearchParams();
  params.set('suite', suite);
  params.set('output', outName);
  params.set('mode', mode);
  params.set('model', model);
  params.set('repeats', repeats);

  evt = new EventSource('/api/rollout/stream?' + params.toString());
  evt.onmessage = function(e) {
    const d = JSON.parse(e.data);
    if (d.type === 'log') appendLine(d.message || '');
    else if (d.type === 'progress') appendLine(String(d.current || 0) + '/' + String(d.total || '?') + ' · ' + String(d.task_id || ''));
    else if (d.type === 'done') { appendLine('完成：' + String(d.output || outName), 'alert alert-success'); setStatus('完成', 'status-done'); finish(); }
    else if (d.type === 'error') { appendLine('错误：' + String(d.error || 'unknown'), 'alert alert-error'); setStatus('错误', 'status-error'); finish(); }
    else appendLine(JSON.stringify(d));
  };
  evt.onerror = function() { setStatus('连接断开', 'status-error'); finish(); };
}
function stopRollout() {
  if (evt) evt.close();
  setStatus('已停止', 'status-error');
  finish();
}
function finish() {
  if (evt) { evt.close(); evt = null; }
  document.getElementById('run').disabled = false;
  document.getElementById('stop').style.display = 'none';
}
</script>
{% endblock %}
