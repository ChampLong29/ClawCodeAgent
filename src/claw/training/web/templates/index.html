<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claw Training Rollouts</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           margin: 2rem auto; max-width: 980px; padding: 0 1rem; color: #222; }
    h1 { border-bottom: 2px solid #444; padding-bottom: .4rem; }
    .meta { color: #666; font-size: .9em; margin-bottom: 1.5rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: .5rem .8rem; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #f5f5f5; font-weight: 600; }
    tr:hover { background: #fafafa; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .empty { padding: 2rem; text-align: center; color: #888; background: #f9f9f9; border-radius: 4px; }
    code { background: #f4f4f4; padding: .15rem .35rem; border-radius: 3px; font-size: .85em; }
  </style>
</head>
<body>
  <h1>Claw Training Rollouts</h1>
  <div class="meta">Results directory: <code>{{ results_dir }}</code></div>
  {% if files %}
  <table>
    <thead>
      <tr><th>File</th><th>Rollouts</th><th>Size (bytes)</th></tr>
    </thead>
    <tbody>
      {% for f in files %}
      <tr>
        <td><a href="/runs/{{ f.filename }}">{{ f.filename }}</a></td>
        <td>{{ f.rollouts }}</td>
        <td>{{ f.size_bytes }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <div class="empty">No <code>*.jsonl</code> files found in this directory.</div>
  {% endif %}
</body>
</html>
